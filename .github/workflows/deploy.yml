name: Deploy Angular to GitHub Pages (Tag आधारित)

on:
  push:
    tags:
      - 'v*'   # triggers only for tags like v1.0.0, v2.1.3

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: |
          npm run build -- --configuration production --base-href "/women-fashion-store/"
        # 👆 replace repo name if needed

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/luxe-boutique

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4